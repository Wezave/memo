<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memo Game</title>
    <link rel="icon" href="./images/icon.ico" sizes="any" />
    <link rel="stylesheet" href="./fonts/fonts.css">
    <link rel="stylesheet" href="./styles/styles.css" />
  </head>
  <body>
    <section class="start-menu">
      <h1>Игра "Мемо"</h1>
      <nav>
        <ul class="start-menu-options">
          <li>
            <h2>
              Что ищем
            </h2>
            <button>Числа</button>
            <button>Эмодзи</button>
            <button>Символы</button>
          </li>
          <li>
            <h2>
              Размер поля
            </h2>
            <input type="range" id="size-range" min="2" max="10" step="2" value="4">
            <span id="size-value">4x4</span>
          </li>
          <li>
            <h2>
              Время на ход
            </h2>
            <button>Без ограничений</button>
            <button>10с</button>
            <button>20с</button>
          </li>
        </ul> 
      </nav>
      <button class="start-button">СТАРТ</button>
    </section>
    <section class="game visibility-hidden">
      <button class="home-button" type="button"><img src="./images/icon-home.svg" alt="кнопка возвращаения на стартовый экран"></button>
        <template id="card-template">
            <div class="card">
                <div class="card-front visibility-hidden">
                </div>
                <div class="card-back">
                    ?
                </div>
            </div>
        </template>
        <div class="board">
        </div>
        <p class="moves-count">
        </p>
    </section>
    <script src="script.js"></script>
  </body>
</html>
